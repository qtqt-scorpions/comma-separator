<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển đổi Cột sang Danh sách</title>
    <style>
        :root {
            --primary: #008CBA;
            --danger: #f44336;
            --success: #5cb85c;
            --bg: #f9f9f9;
            --border: #ccc;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #444;
            margin-bottom: 25px;
        }
        .main-layout {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .column h3 {
            margin-bottom: 10px;
            color: var(--primary);
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 300px;
            resize: vertical;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
        }
        .middle-controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            width: 60px;
        }
        .middle-controls button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 0;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.2s;
        }
        .middle-controls button:hover {
            opacity: 0.8;
        }
        .middle-controls button.clear {
            background-color: var(--danger);
        }
        
        .result-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            background: #eef8fb;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #d4ebf2;
        }
        .item-count {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary);
        }
        .copy-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .copy-btn:hover { background: #4cae4c; }
        
        .settings-panel {
            background: var(--bg);
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        .settings-col {
            flex: 1;
            min-width: 250px;
        }
        .setting-group {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .setting-group label.group-title {
            font-weight: bold;
            min-width: 130px;
            color: #222;
            margin-top: 5px;
        }
        input[type="text"], select {
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .checkbox-group label {
            font-weight: normal;
            cursor: pointer;
        }
        .multi-checkbox {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .multi-checkbox label {
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        .multi-checkbox label:hover {
            background: #e0e0e0;
        }
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #d9534f;
            cursor: pointer;
        }
        .toggle-switch.active {
            color: var(--success);
        }
        .delimiter-box {
            background: #fff;
            padding: 15px;
            border: 1px dashed var(--border);
            border-radius: 4px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Công Cụ Phân Tách Dữ Liệu</h1>
    
    <div class="header-controls">
        <div style="display: flex; gap: 30px; flex-wrap: wrap;">
            <label class="toggle-switch" id="autoConvertLabel">
                <input type="checkbox" id="autoConvert" checked> 
                1. Tự động chuyển đổi
            </label>
            <label class="toggle-switch" id="autoCopyLabel">
                <input type="checkbox" id="autoCopyToClipboard" checked> 
                2. Tự động Copy vào Clipboard
            </label>
        </div>
    </div>

    <div class="main-layout">
        <div class="column">
            <h3>Dữ liệu Gốc (Trái)</h3>
            <textarea id="leftText" placeholder="Nhập dữ liệu vào đây..."></textarea>
        </div>
        
        <div class="middle-controls">
            <button id="toRight" title="Chuyển từ Trái sang Phải"> &gt; </button>
            <button id="toLeft" title="Chuyển từ Phải về Trái"> &lt; </button>
            <button id="clearBtn" class="clear" title="Xóa tất cả"> ✖ </button>
        </div>

        <div class="column">
            <h3>Kết Quả (Phải)</h3>
            <textarea id="rightText" placeholder="Kết quả sẽ hiển thị ở đây..."></textarea>
            
            <div class="result-footer">
                <div class="item-count" id="itemCount">Số lượng: 0</div>
                <button id="copyBtn" class="copy-btn">Copy Kết Quả</button>
            </div>
        </div>
    </div>

    <div class="settings-panel">
        <div class="settings-col">
            <h3>Cài đặt Ký tự phân tách (Delimiter)</h3>
            
            <div class="delimiter-box">
                <div class="setting-group">
                    <label class="group-title">Input (Cột Trái):<br><small style="font-weight:normal; color:#666;">(Có thể chọn nhiều)</small></label>
                    <div class="multi-checkbox">
                        <label><input type="checkbox" class="input-delim-cb" value="newline" checked> Xuống dòng</label>
                        <label><input type="checkbox" class="input-delim-cb" value="comma" checked> Phẩy (,)</label>
                        <label><input type="checkbox" class="input-delim-cb" value="semicolon"> Chấm phẩy (;)</label>
                        <label><input type="checkbox" class="input-delim-cb" value="pipe"> Gạch đứng (|)</label>
                        <label><input type="checkbox" class="input-delim-cb" value="space"> Khoảng trắng</label>
                        <label><input type="checkbox" class="input-delim-cb" value="other"> Khác...</label>
                        <input type="text" id="customInputDelimiter" style="display:none; width: 80px;" placeholder="Nhập kí tự">
                    </div>
                </div>
                
                <hr style="border-top: 1px dashed #ddd; margin: 15px 0;">

                <div class="setting-group" style="align-items: center;">
                    <label class="group-title" style="color: #d9534f; margin-top:0;">Output (Cột Phải):</label>
                    <select id="outputDelimiter">
                        <option value="comma">, (Phẩy)</option>
                        <option value="newline">Xuống dòng</option>
                        <option value="semicolon">; (Chấm phẩy)</option>
                        <option value="pipe">| (Gạch đứng)</option>
                        <option value="space">Khoảng trắng</option>
                        <option value="other">Tùy chỉnh (Other)...</option>
                    </select>
                    <input type="text" id="customOutputDelimiter" style="display:none; width: 80px;" placeholder="Nhập kí tự">
                </div>
            </div>
        </div>

        <div class="settings-col">
            <h3>Tùy chọn xử lý</h3>
            <div class="checkbox-group">
                <label><input type="checkbox" id="lowercaseList"> Lowercase list (Chữ thường)</label>
                <label><input type="checkbox" id="reverseList"> Reverse list (Đảo ngược)</label>
                <label><input type="checkbox" id="removeLineBreaks" checked> Remove Line/Paragraph Breaks</label>
                <label><input type="checkbox" id="removeExtraSpaces" checked> Remove extra spaces (Xóa khoảng trắng thừa)</label>
                <label><input type="checkbox" id="removeAllWhitespace"> Remove all whitespace (Xóa TẤT CẢ khoảng trắng)</label>
                <label><input type="checkbox" id="removeDuplicates" checked> Remove duplicates (Xóa trùng lặp)</label>
            </div>
        </div>
    </div>
</div>

<script>
    const leftText = document.getElementById('leftText');
    const rightText = document.getElementById('rightText');
    const outputDelimSelect = document.getElementById('outputDelimiter');
    const customOutputDelim = document.getElementById('customOutputDelimiter');
    const customInputDelim = document.getElementById('customInputDelimiter');
    const inputCheckboxes = document.querySelectorAll('.input-delim-cb');
    const itemCountDisplay = document.getElementById('itemCount');
    const copyBtn = document.getElementById('copyBtn');
    
    let typingTimer;
    const doneTypingInterval = 300; // Đã giảm từ 600ms xuống 300ms để mượt hơn

    const settingsIds = [
        'autoConvert', 'autoCopyToClipboard', 'outputDelimiter', 
        'customInputDelimiter', 'customOutputDelimiter',
        'lowercaseList', 'reverseList', 'removeLineBreaks', 
        'removeExtraSpaces', 'removeAllWhitespace', 'removeDuplicates'
    ];

    function saveSettings() {
        settingsIds.forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            if (el.type === 'checkbox') {
                localStorage.setItem(id, el.checked);
            } else {
                localStorage.setItem(id, el.value);
            }
        });

        const selectedInputs = Array.from(inputCheckboxes)
                                    .filter(cb => cb.checked)
                                    .map(cb => cb.value);
        localStorage.setItem('inputDelimitersArray', JSON.stringify(selectedInputs));
    }

    function loadSettings() {
        settingsIds.forEach(id => {
            const val = localStorage.getItem(id);
            if (val !== null) {
                const el = document.getElementById(id);
                if (!el) return;
                if (el.type === 'checkbox') {
                    el.checked = val === 'true';
                } else {
                    el.value = val;
                }
            }
        });

        const savedInputs = localStorage.getItem('inputDelimitersArray');
        if (savedInputs) {
            const arr = JSON.parse(savedInputs);
            inputCheckboxes.forEach(cb => {
                cb.checked = arr.includes(cb.value);
            });
        }

        toggleCustomDelimiterVisibility();
        toggleToggleUI('autoConvert', 'autoConvertLabel');
        toggleToggleUI('autoCopyToClipboard', 'autoCopyLabel');
    }

    function toggleCustomDelimiterVisibility() {
        const isOtherInputChecked = Array.from(inputCheckboxes).some(cb => cb.value === 'other' && cb.checked);
        customInputDelim.style.display = isOtherInputChecked ? 'inline-block' : 'none';
        customOutputDelim.style.display = outputDelimSelect.value === 'other' ? 'inline-block' : 'none';
    }

    function toggleToggleUI(checkboxId, labelId) {
        const isChecked = document.getElementById(checkboxId).checked;
        const label = document.getElementById(labelId);
        if (isChecked) {
            label.classList.add('active');
        } else {
            label.classList.remove('active');
        }
    }

    function doCopy(textData) {
        if (!textData) return;
        navigator.clipboard.writeText(textData).then(() => {
            copyBtn.innerText = 'Đã Copy ✔';
            copyBtn.style.background = '#d9534f';
            setTimeout(() => {
                copyBtn.innerText = 'Copy Kết Quả';
                copyBtn.style.background = 'var(--success)';
            }, 1500);
        }).catch(err => console.error("Lỗi copy: ", err));
    }

    copyBtn.addEventListener('click', () => doCopy(rightText.value));

    function getInputRegexSeparator() {
        let selected = [];
        inputCheckboxes.forEach(cb => {
            if (cb.checked) {
                if (cb.value === 'newline') selected.push('\\r?\\n');
                if (cb.value === 'comma') selected.push(',');
                if (cb.value === 'semicolon') selected.push(';');
                if (cb.value === 'pipe') selected.push('\\|');
                if (cb.value === 'space') selected.push(' ');
                if (cb.value === 'other') {
                    const customVal = customInputDelim.value;
                    if (customVal) {
                        selected.push(customVal.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
                    }
                }
            }
        });

        if (selected.length === 0) return /\r?\n/;
        return new RegExp('(?:' + selected.join('|') + ')');
    }

    function getStringSeparatorForLeft() {
        const firstChecked = document.querySelector('.input-delim-cb:checked');
        if (!firstChecked) return '\n';
        
        const val = firstChecked.value;
        if (val === 'comma') return ', ';
        if (val === 'semicolon') return '; ';
        if (val === 'pipe') return ' | ';
        if (val === 'space') return ' ';
        if (val === 'newline') return '\n';
        if (val === 'other') return customInputDelim.value || '\n';
        return '\n';
    }

    function getOutputStringSeparator() {
        const val = outputDelimSelect.value;
        if (val === 'comma') return ', ';
        if (val === 'semicolon') return '; ';
        if (val === 'pipe') return ' | ';
        if (val === 'space') return ' ';
        if (val === 'newline') return '\n';
        if (val === 'other') return customOutputDelim.value;
        return ', ';
    }
    
    function getOutputRegexSeparator() {
        const val = outputDelimSelect.value;
        if (val === 'newline') return /\r?\n/;
        if (val === 'comma') return /,/;
        if (val === 'semicolon') return /;/;
        if (val === 'pipe') return /\|/;
        if (val === 'space') return / /;
        if (val === 'other') return new RegExp(customOutputDelim.value, 'g');
        return /\r?\n/;
    }

    function processLeftToRight() {
        let text = leftText.value;
        if (!text.trim()) {
            rightText.value = '';
            itemCountDisplay.innerText = 'Số lượng: 0';
            return;
        }

        let separator = getInputRegexSeparator();
        let rawItems = text.split(separator);
        
        // Tối ưu hóa: Gộp tất cả các thao tác lọc, định dạng vào 1 vòng lặp duy nhất O(N)
        let items = [];
        let seen = new Set();
        
        const doRemoveAllWS = document.getElementById('removeAllWhitespace').checked;
        const doRemoveExtraWS = document.getElementById('removeExtraSpaces').checked;
        const doLowercase = document.getElementById('lowercaseList').checked;
        const doRemoveDupes = document.getElementById('removeDuplicates').checked;

        for (let i = 0; i < rawItems.length; i++) {
            let item = rawItems[i];
            
            if (!item || !item.trim()) continue; // Bỏ qua phần tử rỗng

            // Xử lý khoảng trắng
            if (doRemoveAllWS) {
                item = item.replace(/\s+/g, '');
            } else if (doRemoveExtraWS) {
                item = item.replace(/\s+/g, ' ').trim();
            } else {
                item = item.trim();
            }

            if (item === '') continue; // Check lại lần nữa sau khi trim

            // Chữ thường
            if (doLowercase) {
                item = item.toLowerCase();
            }

            // Xóa trùng lặp
            if (doRemoveDupes) {
                if (seen.has(item)) continue;
                seen.add(item);
            }

            items.push(item);
        }

        // Đảo ngược
        if (document.getElementById('reverseList').checked) {
            items.reverse();
        }

        itemCountDisplay.innerText = `Số lượng: ${items.length}`;

        // Nối chuỗi
        let joinStr = getOutputStringSeparator();
        if (doRemoveAllWS) {
            joinStr = joinStr.replace(/ /g, '');
        }

        if (!document.getElementById('removeLineBreaks').checked && outputDelimSelect.value !== 'newline') {
            joinStr = joinStr.trim() + '\n';
        }

        let resultText = items.join(joinStr);
        
        // Chỉ cập nhật DOM nếu giá trị thực sự thay đổi để tránh reflow giao diện
        if (rightText.value !== resultText) {
            rightText.value = resultText;
        }

        if (document.getElementById('autoCopyToClipboard').checked) {
            doCopy(resultText);
        }
    }

    function processRightToLeft() {
        let text = rightText.value;
        if (!text.trim()) return;

        let splitSeparator = getOutputRegexSeparator();
        let items = text.split(splitSeparator);

        let finalItems = [];
        for (let i = 0; i < items.length; i++) {
            let item = items[i].trim();
            if (item !== '') finalItems.push(item);
        }

        let joinStrLeft = getStringSeparatorForLeft();
        leftText.value = finalItems.join(joinStrLeft);
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadSettings();
        if (leftText.value) processLeftToRight();
    });

    // Lắng nghe thay đổi cài đặt -> Lưu bộ nhớ và Chạy lại
    inputCheckboxes.forEach(cb => {
        cb.addEventListener('change', () => {
            saveSettings();
            toggleCustomDelimiterVisibility();
            if (document.getElementById('autoConvert').checked) processLeftToRight();
        });
    });

    settingsIds.forEach(id => {
        const el = document.getElementById(id);
        if(!el) return;

        el.addEventListener('change', () => {
            saveSettings(); // Chỉ lưu khi click đổi setting
            if (id === 'outputDelimiter') toggleCustomDelimiterVisibility();
            if (id === 'autoConvert') toggleToggleUI('autoConvert', 'autoConvertLabel');
            if (id === 'autoCopyToClipboard') toggleToggleUI('autoCopyToClipboard', 'autoCopyLabel');
            
            if (document.getElementById('autoConvert').checked) processLeftToRight();
        });
        if (el.type === 'text') {
            el.addEventListener('input', () => {
                saveSettings();
                if (document.getElementById('autoConvert').checked) processLeftToRight();
            });
        }
    });

    // Lắng nghe gõ phím -> Không lưu bộ nhớ, chỉ xử lý dữ liệu để giảm lag
    leftText.addEventListener('input', () => {
        if (document.getElementById('autoConvert').checked) {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(processLeftToRight, doneTypingInterval);
        }
    });

    document.getElementById('toRight').addEventListener('click', processLeftToRight);
    document.getElementById('toLeft').addEventListener('click', processRightToLeft);
    
    document.getElementById('clearBtn').addEventListener('click', () => {
        leftText.value = '';
        rightText.value = '';
        itemCountDisplay.innerText = 'Số lượng: 0';
    });

</script>

</body>
</html>
